<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />

    <title>BeachControlWeb</title>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div>
          <h1>🌊 BeachControl</h1>
          <p class="subtitle">Tu playa en tiempo real</p>
        </div>

        <div class="controls">
          <select id="citySelector"></select>
        </div>
      </header>

      <main class="dashboard">
        <section class="main-status card">
          <div class="status-header">
            <h2>Estado del mar</h2>
            <span id="status"></span>
          </div>
          <p id="alert"></p>
        </section>

        <section class="metrics">
          <div class="card metric">
            <span>🌡️</span>
            <p id="temp"></p>
            <small>Temperatura</small>
          </div>

          <div class="card metric">
            <span>💨</span>
            <p id="wind"></p>
            <small>Viento</small>
          </div>

          <div class="card metric">
            <span>🌊</span>
            <p id="wave"></p>
            <small>Oleaje</small>
          </div>
        </section>
      </main>

      <footer class="footer">
        <span id="fecha"></span>
        <span id="reloj"></span>
      </footer>
    </div>
  </body>
  <script type="module" src="./js/app.js"></script>
</html>
